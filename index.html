<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Mesh Puzzle 🫖</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫖</text></svg>"
    />
  </head>
  <body>
    <div id="app"></div>

    <div id="hud" class="hidden">
      <div class="hud-group">
        <button id="menu-btn" title="Levels">☰</button>
        <span id="level-name" class="pill"></span>
      </div>
      <div class="hud-group">
        <span id="count" class="pill">0 / 0</span>
        <span id="timer" class="pill">0:00</span>
        <span id="moves" class="pill" title="Moves">0 ↔</span>
        <button id="reset">Reset</button>
      </div>
    </div>
    <div id="hint" class="hidden"></div>

    <div id="menu" class="screen">
      <h1>Mesh Puzzle</h1>
      <p class="subtitle">Reassemble the sliced shapes</p>
      <div id="level-grid"></div>
      <button id="settings-btn">Settings</button>
    </div>

    <div id="settings" class="screen hidden">
      <div class="panel">
        <h1 style="font-size: 22px">Settings</h1>
        <label class="setting-row">
          <span>Sound effects</span>
          <input type="checkbox" id="opt-sfx" checked />
        </label>
        <label class="setting-row">
          <span>Ambient sound</span>
          <input type="checkbox" id="opt-ambient" />
        </label>
        <button id="reset-progress" class="danger">Reset progress</button>
        <button id="settings-close" class="primary">Done</button>
      </div>
    </div>

    <div id="win" class="screen hidden">
      <h1 id="win-title">Solved!</h1>
      <div id="stars" class="hidden"></div>
      <div id="win-stats"></div>
      <div id="win-sub"></div>
      <div class="row">
        <button id="win-levels">Levels</button>
        <button id="win-replay">Replay</button>
        <button id="win-next" class="primary">Next →</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
