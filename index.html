<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Mesh Puzzle 🫖</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫖</text></svg>"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a2028;
        font-family: system-ui, -apple-system, sans-serif;
        color: #e8e4dd;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
      }
      #count {
        background: rgba(15, 20, 27, 0.65);
        backdrop-filter: blur(6px);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 15px;
        font-variant-numeric: tabular-nums;
      }
      button {
        pointer-events: auto;
        background: rgba(15, 20, 27, 0.65);
        backdrop-filter: blur(6px);
        color: #e8e4dd;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 15px;
        cursor: pointer;
      }
      button:active {
        background: rgba(80, 110, 150, 0.5);
      }
      #hint {
        position: fixed;
        bottom: max(18px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 20, 27, 0.65);
        backdrop-filter: blur(6px);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 13px;
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 1s ease;
      }
      #hint.faded {
        opacity: 0;
      }
      #win {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
        justify-content: center;
        background: rgba(10, 14, 19, 0.75);
        backdrop-filter: blur(4px);
        z-index: 10;
      }
      #win.hidden {
        display: none;
      }
      #win h1 {
        font-size: 34px;
        font-weight: 700;
      }
      #win button {
        font-size: 17px;
        padding: 12px 22px;
        background: rgba(60, 130, 90, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span id="count">0 / 0</span>
      <button id="reset">Reset</button>
    </div>
    <div id="hint">Drag the pieces into the ghost teapot · drag empty space to orbit</div>
    <div id="win" class="hidden">
      <h1>Solved! 🫖</h1>
      <button id="again">Play again</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
